<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56" role="img" aria-label="Bitezy icon">
  <defs>
    <linearGradient id="bitezyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#EE5253"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background with brand gradient -->
  <rect width="56" height="56" rx="14" fill="url(#bitezyGrad)"/>

  <!-- Burger icon — top bun (filled dome) -->
  <path d="M 8,25 C 8,10 48,10 48,25 Z" fill="white"/>

  <!-- Sesame seeds on top bun -->
  <ellipse cx="20" cy="20" rx="2.8" ry="1.3" fill="url(#bitezyGrad)" opacity="0.5" transform="rotate(-20 20 20)"/>
  <ellipse cx="28" cy="16" rx="2.8" ry="1.3" fill="url(#bitezyGrad)" opacity="0.5"/>
  <ellipse cx="36" cy="20" rx="2.8" ry="1.3" fill="url(#bitezyGrad)" opacity="0.5" transform="rotate(20 36 20)"/>

  <!-- Patty / filling layer -->
  <rect x="8" y="27" width="40" height="6" rx="2" fill="white" opacity="0.85"/>

  <!-- Bottom bun (rounded-bottom rect) -->
  <path d="M 8,35 L 48,35 Q 48,46 40,46 L 16,46 Q 8,46 8,35 Z" fill="white"/>
</svg>
