<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 56" width="210" height="56" role="img" aria-label="Bitezy">
  <defs>
    <linearGradient id="bitezyIconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#EE5253"/>
    </linearGradient>
    <linearGradient id="bitezyTextGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#EE5253"/>
    </linearGradient>
  </defs>

  <!-- ── Icon mark (56×56) ── -->

  <!-- Rounded square background -->
  <rect width="56" height="56" rx="14" fill="url(#bitezyIconGrad)"/>

  <!-- Top bun (dome) -->
  <path d="M 8,25 C 8,10 48,10 48,25 Z" fill="white"/>

  <!-- Sesame seeds -->
  <ellipse cx="20" cy="20" rx="2.8" ry="1.3" fill="url(#bitezyIconGrad)" opacity="0.5" transform="rotate(-20 20 20)"/>
  <ellipse cx="28" cy="16" rx="2.8" ry="1.3" fill="url(#bitezyIconGrad)" opacity="0.5"/>
  <ellipse cx="36" cy="20" rx="2.8" ry="1.3" fill="url(#bitezyIconGrad)" opacity="0.5" transform="rotate(20 36 20)"/>

  <!-- Patty layer -->
  <rect x="8" y="27" width="40" height="6" rx="2" fill="white" opacity="0.85"/>

  <!-- Bottom bun -->
  <path d="M 8,35 L 48,35 Q 48,46 40,46 L 16,46 Q 8,46 8,35 Z" fill="white"/>

  <!-- ── Wordmark ── -->
  <text
    x="68" y="40"
    font-family="'Poppins','Helvetica Neue',Arial,sans-serif"
    font-weight="800"
    font-size="30"
    letter-spacing="-0.5"
    fill="url(#bitezyTextGrad)">Bitezy</text>
</svg>
