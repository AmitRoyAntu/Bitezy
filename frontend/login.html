<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Bitezy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="auth-container">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your Bitezy account</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="text" id="loginEmail" class="form-input" placeholder="e.g. demo@cuet.ac.bd" required>
                    <div class="field-error" id="emailError"><i class="fa-solid fa-circle-exclamation"></i> <span>Please enter a valid email or student ID</span></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required>
                    <div class="field-error" id="passwordError"><i class="fa-solid fa-circle-exclamation"></i> <span>Password is required</span></div>
                </div>

                <button type="submit" class="submit-btn">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Create one</a>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"><i class="fa-solid fa-check-circle"></i> <span></span></div>

    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
